<div class="dashboard" [style.background]="bgGradient">

  <div class="layout">

    <!-- Header -->
    <div class="header">
      <div class="logo">⛅ Weather</div>
      <div class="header-right">
        <button class="unit-toggle" (click)="toggleUnit()">
          °{{ unit() === 'C' ? 'F' : 'C' }}
        </button>
        <button class="btn-ghost" (click)="onSaveCity()" *ngIf="weather()">
          ⭐ შენახვა
        </button>
      </div>
    </div>

    <!-- Search -->
    <app-search 
      (citySelected)="onCitySelect($event)" 
      (useLocation)="onUseLocation()">
    </app-search>

    <!-- Saved Cities -->
    <app-saved-cities (citySelected)="onCitySelect($event)"></app-saved-cities>

    @if (loading()) {
      <div class="loading">
        <div class="spinner"></div>
        <p>მონაცემები იტვირთება...</p>
      </div>
    }

    @if (error()) {
      <div class="error">⚠️ {{ error() }}</div>
    }

    @if (weather() && !loading()) {
      <div class="content">

        <app-current-weather 
          [weather]="weather()!" 
          [unit]="unit()">
        </app-current-weather>

        <app-hourly-chart 
          [hours]="weather()!.forecast.forecastday[0].hour" 
          [unit]="unit()">
        </app-hourly-chart>

        <div>
          <div class="section-title">7-დღიანი პროგნოზი</div>
          <div class="forecast-grid">
            @for (day of weather()!.forecast.forecastday; track day.date) {
              <app-forecast-card 
                [day]="day" 
                [unit]="unit()">
              </app-forecast-card>
            }
          </div>
        </div>

      </div>
    }

  </div>
</div>
